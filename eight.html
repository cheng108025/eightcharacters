<section class="links">
<h2>常用工具連結</h2>
<ul>

</section>

<nav id="toc"><strong>目錄</strong><ul id="toclist"></ul></nav>
<main id="content"><p class="loading">筆記載入中…</p></main>
<a class="top" href="#" title="回頂部">▲</a>

<script src="marked.min.js"></script>
<script>
const FILES = [
  '01-daymaster',
  '02-stem-combination',
  '03-month-personality',
  '04-month-health',
  '05-branch-relations',
  '06-palace-sixkin',
  '07-horse-flower-vault',
  '08-strength',
  '09-ten-gods-basics',
  '10-ten-gods-personality',
  '11-yearly-ten-gods',
  '12-yearly-taisui',
  '13-sixkin-fate',
  '14-marriage-match',
  '15-romance-boost',
  '16-yearly-simple',
  '17-fengshui',
];

(async () => {
  const main = document.getElementById('content');
  const toclist = document.getElementById('toclist');
  try {
    const texts = await Promise.all(FILES.map(f =>
      fetch('notes/' + f + '.md').then(r => {
        if (!r.ok) throw new Error(f);
        return r.text();
      })
    ));
    main.innerHTML = '';
    texts.forEach((md, i) => {
      const m = md.match(/^#\s+(.+)$/m);
      const title = m ? m[1].trim() : '第 ' + (i + 1) + ' 章';
      const body = m ? md.replace(m[0], '') : md;

      const card = document.createElement('details');
      card.className = 'card';
      card.id = 'c' + i;
      card.innerHTML =
        '<summary><span class="num">' + String(i + 1).padStart(2, '0') + '</span>' +
        title + '</summary>' +
        '<div class="card-body">' + marked.parse(body) + '</div>';
      main.appendChild(card);

      const li = document.createElement('li');
      const a = document.createElement('a');
      a.href = '#c' + i;
      a.textContent = title;
      a.addEventListener('click', () => { card.open = true; });
      li.appendChild(a);
      toclist.appendChild(li);
    });
  } catch (e) {
    main.innerHTML = '<p class="loading">筆記載入失敗(' + e.message +
      ')。若在本機直接開啟檔案,請先啟動小型伺服器,例如:python -m http.server,再以 http://localhost:8000 瀏覽。</p>';
  }
})();
</script>
</body>
</html>
