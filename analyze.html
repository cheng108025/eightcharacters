function tenGod(dayStem, other) {
  const de = ELEM[dayStem], oe = ELEM[other];
  const same = (YANG.includes(dayStem) === YANG.includes(other));
  if (de === oe) return same ? '比肩' : '劫財';
  if (GEN[de] === oe) return same ? '食神' : '傷官';
  if (KE[de] === oe) return same ? '偏財' : '正財';
  if (KE[oe] === de) return same ? '七殺' : '正官';
  return same ? '偏印' : '正印';
}

// ===== 分析 =====
function analyze() {
  const stems = [0,1,2,3].map(i => document.getElementById('s'+i).value);
  const branches = [0,1,2,3].map(i => document.getElementById('b'+i).value);
  const day = stems[2], month = branches[1];
  const out = [];
  const sec = (title, items) => {
    if (!items.length) return;
    out.push('<div class="result-card"><h2>' + title + '</h2>' +
      items.map(t => '<p>' + t + '</p>').join('') + '</div>');
  };

  // 命盤
  sec('你的命盤', ['<span class="tag">時 ' + stems[3] + branches[3] + '</span>' +
    '<span class="tag">日 ' + stems[2] + branches[2] + '</span>' +
    '<span class="tag">月 ' + stems[1] + branches[1] + '</span>' +
    '<span class="tag">年 ' + stems[0] + branches[0] + '</span>' +
    ' 日主:<b>' + day + ELEM[day] + '</b>']);

  // 日主個性
  const D = DAYMASTER[day];
  sec('日主個性(' + day + ELEM[day] + ')', [
    D.desc,
    '<span class="lbl">優點:</span>' + D.good,
    '<span class="lbl">缺點:</span>' + D.bad,
    '<span class="lbl">' + D.tips.split(':')[0] + ':</span>' + D.tips.split(/:(.+)/)[1]
  ]);

  // 月支性情
  const M = MONTH_PERSONALITY[month];
  sec('月支性情(' + month + ')', [
    M.desc,
    '<span class="lbl">心理狀態:</span>' + M.mind,
    '<span class="lbl">' + M.tips.split(':')[0] + ':</span>' + M.tips.split(/:(.+)/)[1],
    '<span class="lbl">先天較弱部位:</span>' + MONTH_HEALTH[month] + '(宜定期健檢,身體問題以就醫為準)'
  ]);

  // 身強身弱
  let group = Object.keys(STRENGTH[ELEM[day]]).find(g => g.includes(month));
  const st = STRENGTH[ELEM[day]][group];
  sec('身強身弱', ['日主 ' + ELEM[day] + ' 生於 ' + month + ' 月 → <b>身' + st + '</b>。' +
    (st === '強'
      ? '身強者較能承擔財官,一生官妻財子祿機運較佳;走「弱」之年為走運。個性上較獨立不服輸、與人爭取計較、身邊必有競爭者,感情上較容易失戀。'
      : '身弱者財官反成負擔,「身弱不得任財官」;走「強」之年為走運,宜穩紮穩打、避免過度擴張與投機。')]);

  // 天干五合 + 多字相同
  const comboItems = [];
  for (let i = 0; i < 4; i++) for (let j = i + 1; j < 4; j++) {
    const key = Object.keys(STEM_COMBO).find(k => k.includes(stems[i]) && k.includes(stems[j]) && stems[i] !== stems[j]);
    if (key) comboItems.push('<span class="tag">' + PILLAR_NAME[i] + '×' + PILLAR_NAME[j] + '</span>' + key + ' ' + STEM_COMBO[key]);
  }
  const stemCount = {};
  stems.forEach(s => stemCount[s] = (stemCount[s] || 0) + 1);
  Object.entries(stemCount).forEach(([s, n]) => {
    if (n >= 3) comboItems.push('天干「' + s + '」出現 ' + n + ' 次:命盤天干多字相同,格局特殊,詳見筆記「天干五合」章。');
  });
  if (comboItems.length)
    comboItems.push('天干有合者:與人相處有情、能接納他人、異性緣佳;但往往缺乏主見、易隨波逐流。');
  sec('天干合化', comboItems.length ? comboItems : ['四柱天干無五合:主見較強、較不受人左右。']);

  // 地支互動(含心理狀態)
  const rel = [];
  const pair = (i, j, label, text) =>
    rel.push('<span class="tag">' + PILLAR_NAME[i] + '×' + PILLAR_NAME[j] + '(' + PALACE[i] + '↔' + PALACE[j] + ')</span><b>' + label + '</b>:' + text);
  for (let i = 0; i < 4; i++) for (let j = i + 1; j < 4; j++) {
    const a = branches[i], b = branches[j];
    let k = Object.keys(SIX_COMBO).find(x => x.includes(a) && x.includes(b) && a !== b);
    if (k) pair(i, j, '六合', SIX_COMBO[k] + '。合到哪旺到哪,這兩宮相處融洽、互相幫助。');
    k = Object.keys(SIX_CLASH).find(x => x.includes(a) && x.includes(b) && a !== b);
    if (k) pair(i, j, '六沖', SIX_CLASH[k] + '。沖到哪動盪到哪,這兩宮易有衝突與變動;走運逢沖則發、不走運逢沖則墜。');
    k = Object.keys(SIX_HARM).find(x => x.includes(a) && x.includes(b) && a !== b);
    if (k) pair(i, j, '六害', SIX_HARM[k] + '。害到哪收不到成果,這兩宮易有心結、聚少離多。');
    for (const p of PUNISH) {
      if (a !== b && p.set.includes(a) && p.set.includes(b))
        pair(i, j, p.name, p.desc + '。刑到哪鬱悶到哪,這兩宮之間有精神層面的內耗。');
    }
    if (a === b && SELF_PUNISH[a]) pair(i, j, '自刑(' + a + a + ')', SELF_PUNISH[a]);
  }
  // 三合/三會
  const bset = branches.join('');
  Object.entries(TRI_COMBO).forEach(([k, v]) => {
    const hit = [...k].filter(c => bset.includes(c)).length;
    if (hit === 3) rel.push('<b>三合 ' + k + '</b> ' + v);
    else if (hit === 2) rel.push('<b>半合(' + [...k].filter(c => bset.includes(c)).join('') + ')</b> 具' + v.split(':')[0] + '傾向,力量較弱;流年補齊第三字時特別有感。');
  });
  Object.entries(TRI_MEET).forEach(([k, v]) => {
    if ([...k].every(c => bset.includes(c)))
      rel.push('<b>三會 ' + k + '(' + v + ')</b> 力量大於一切;與日主同類則' + (st === '弱' ? '有利(身弱得幫)' : '不利(身強更旺過頭)') + ',成會之年通常特別有事。');
  });
  sec('地支互動與心理狀態', rel.length ? rel : ['四柱地支間無明顯刑沖合害,個性相對平穩、內在衝突少。']);

  // 馬花庫
  const cnt = s => branches.filter(b => s.includes(b)).length;
  sec('四馬・四花・四庫', [
    '<b>驛馬 ' + cnt(HORSE) + ' 顆</b>(行動力):' + HORSE_MSG[cnt(HORSE)],
    '<b>桃花 ' + cnt(FLOWER) + ' 顆</b>(人緣異性緣):' + FLOWER_MSG[cnt(FLOWER)],
    '<b>財庫 ' + cnt(VAULT) + ' 顆</b>(聚財力):' + VAULT_MSG[cnt(VAULT)]
  ]);

  // 十神
  const tgItems = [];
  const seen = {};
  [0, 1, 3].forEach(i => {
    const g = tenGod(day, stems[i]);
    seen[g] = (seen[g] || 0) + 1;
    const T = TEN_GOD[g];
    tgItems.push(
      '<span class="tag">' + PILLAR_NAME[i] + '干 ' + stems[i] + '</span><b>' + g + '</b>:' + T.desc +
      '<br><span class="lbl">▸ ' + T.tips.split(':')[0] + ':</span>' + T.tips.split(/:(.+)/)[1] +
      '<br><span class="lbl">▸ 落在' + PILLAR_NAME[i] + ':</span>' + T.pos[i]
    );
  });
  Object.entries(seen).forEach(([g, n]) => {
    if (n >= 2) tgItems.push('「' + g + '」出現 ' + n + ' 次:此特質特別突出,優點與缺點都會放大,請對照上述描述加倍留意。');
  });
  tgItems.push('說明:年柱管童年與長上(約1–16歲)、月柱管青年與兄弟朋友(約17–32歲)、時柱管晚年與子女部屬。吉凶還須配合身強身弱與喜忌綜合判斷;此處僅以天干論,地支藏干未計,完整論斷請見筆記「十神論斷」章。');
  sec('十神特質(以日主 ' + day + ' 論其他天干)', tgItems);

  out.push('<p class="disclaimer">以上為筆記規則的自動比對結果,僅供參考。完整論斷(宮位六親、流年吉凶、合婚)請見 <a href="eight.html">筆記首頁</a> 各章節。</p>');
  document.getElementById('result').innerHTML = out.join('');
}

// ===== 初始化 =====
[0,1,2,3].forEach(i => {
  const ss = document.getElementById('s'+i), bs = document.getElementById('b'+i);
  [...STEMS].forEach(c => ss.add(new Option(c, c)));
  [...BRANCHES].forEach(c => bs.add(new Option(c, c)));
});
document.getElementById('run').addEventListener('click', analyze);
</script>
